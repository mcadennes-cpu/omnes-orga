<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Hors connexion — Omnès Orga</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F5F7F9;
        color: #1a3a52;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        min-height: 100vh;
      }
      .icon {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 32px;
        box-shadow: 0 4px 12px rgba(26, 58, 82, 0.08);
      }
      .icon img {
        width: 72px;
        height: 72px;
        border-radius: 16px;
      }
      h1 {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: rgba(26, 58, 82, 0.6);
        max-width: 320px;
        margin-bottom: 32px;
      }
      button {
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        padding: 14px 28px;
        border: none;
        border-radius: 14px;
        background: #1a3a52;
        color: white;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(26, 58, 82, 0.2);
        transition: transform 0.1s;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="icon">
      <img src="/apple-touch-icon.png" alt="Omnès Orga" />
    </div>
    <h1>Pas de connexion</h1>
    <p>Vérifiez votre connexion internet, puis réessayez.</p>
    <button onclick="window.location.reload()">Réessayer</button>
  </body>
</html>
